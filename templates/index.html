<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Printer</title>
  <link id="theme-link" rel="stylesheet" href="https://unpkg.com/terminal.css@0.7.5/dist/terminal.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="/static/main.js"></script>
</head>

<body class="terminal">

  <!-- Theme switcher -->
  <div id="theme-switcher" class="btn-groups">
    <button class="btn" onclick="setTheme('terminal')" data-theme="terminal">Terminal</button>
    <button class="btn" onclick="setTheme('xp')" data-theme="xp">XP</button>
    <button class="btn" onclick="setTheme('98')" data-theme="98">98</button>
  </div>

  <!-- XP/98 window chrome (shown only in windowed themes) -->
  <div id="xp-window" class="window hidden">
    <div class="title-bar">
      <div class="title-bar-text">Thermal Printer</div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize"></button>
        <button aria-label="Close"></button>
      </div>
    </div>
    <div class="window-body" id="xp-body"></div>
  </div>

  <!-- Main content (moved into xp-body when windowed theme is active) -->
  <div id="main-content">
    <h1 id="main-title">Thermal Printer</h1>
    <!-- Status -->
    <section>
      <h3>Printer Status</h3>
      <div id="status-box">
        <span id="status-indicator"></span>
        <span id="status-text">—</span>
        <span id="status-paper">—</span>
        <button class="btn btn-default" hx-get="/status" hx-target="#status-result" hx-swap="innerHTML"
          hx-on::after-request="updateStatus(event)" id="refresh-btn">Refresh</button>
        <span class="htmx-indicator" id="htmx-status">loading…</span>
      </div>
      <div id="status-result" class="hidden"></div>
    </section>

    <!-- Print Job Builder -->
    <section>
      <h3>Print Job</h3>

      <ul id="items-list"></ul>

      <!-- Add Item Form -->
      <div class="add-form">
        <div id="type-tabs" class="btn-groups">
          <button class="active btn btn-ghost" onclick="switchType('text')">
            Text
          </button><button class="btn" onclick="switchType('qr')">
            QR
          </button><button class="btn" onclick="switchType('barcode')">
            Barcode
          </button><button class="btn" onclick="switchType('image')">
            Image
          </button><button class="btn" onclick="switchType('cut')">
            Cut
          </button>
        </div>

        <!-- Text -->
        <div id="form-text">
          <div class="field field-row-stacked">
            <label for="text-content">Content</label>
            <textarea id="text-content" rows="3" placeholder="Hello, World!&#10;"></textarea>
          </div>
          <button class="btn" onclick="addItem('text')">Add Text</button>
        </div>

        <!-- QR -->
        <div id="form-qr" class="hidden">
          <div class="row">
            <div class="field field-row-stacked">
              <label for="qr-content">Content (URL or text)</label>
              <input id="qr-content" type="text" placeholder="https://example.com">
            </div>
            <div class="field field-row-stacked">
              <label for="qr-size">Size (1–8)</label>
              <input id="qr-size" type="number" value="3" min="1" max="8">
            </div>
            <div class="field field-row-stacked">
              <label for="qr-center">Center</label>
              <select id="qr-center">
                <option value="false">No</option>
                <option value="true">Yes</option>
              </select>
            </div>
          </div>
          <button class="btn" onclick="addItem('qr')">Add QR</button>
        </div>

        <!-- Barcode -->
        <div id="form-barcode" class="hidden">
          <div class="row">
            <div class="field field-row-stacked">
              <label for="barcode-content">Content</label>
              <input id="barcode-content" type="text" placeholder="123456789012">
            </div>
            <div class="field field-row-stacked">
              <label for="barcode-format">Format</label>
              <select id="barcode-format">
                <option>EAN13</option>
                <option>EAN8</option>
                <option>UPC-A</option>
                <option>CODE39</option>
                <option>CODE128</option>
                <option>ITF</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="field field-row-stacked">
              <label for="barcode-height">Height</label>
              <input id="barcode-height" type="number" value="64" min="1" max="255">
            </div>
            <div class="field field-row-stacked">
              <label for="barcode-width">Width (1–6)</label>
              <input id="barcode-width" type="number" value="3" min="1" max="6">
            </div>
            <div class="field field-row-stacked">
              <label for="barcode-text-position">Text Position</label>
              <select id="barcode-text-position">
                <option>BELOW</option>
                <option>ABOVE</option>
                <option>BOTH</option>
                <option>OFF</option>
              </select>
            </div>
          </div>
          <button class="btn" onclick="addItem('barcode')">Add Barcode</button>
        </div>

        <!-- Image -->
        <div id="form-image" class="hidden">
          <div class="field field-row-stacked">
            <label for="image-file">Image File</label>
            <input id="image-file" type="file" accept="image/*" onchange="previewImage(this)">
          </div>
          <div id="image-preview-wrap" class="hidden field">
            <img id="image-preview">
          </div>
          <details>
            <summary>Advanced Options</summary>
            <div class="row">
              <div class="field field-row-stacked">
                <label for="image-impl">Implementation</label>
                <select id="image-impl">
                  <option value="bitImageRaster">bitImageRaster</option>
                  <option value="bitImageColumn">bitImageColumn</option>
                  <option value="graphics">graphics</option>
                </select>
              </div>
              <div class="field field-row-stacked">
                <label for="image-fragment-height">Fragment Height</label>
                <input id="image-fragment-height" type="number" value="960" min="1">
              </div>
              <div class="field field-row-stacked">
                <label for="image-center">Center</label>
                <select id="image-center">
                  <option value="false">No</option>
                  <option value="true">Yes</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="field field-row-stacked">
                <label for="image-hd-v">High Density Vertical</label>
                <select id="image-hd-v">
                  <option value="true">Yes</option>
                  <option value="false">No</option>
                </select>
              </div>
              <div class="field field-row-stacked">
                <label for="image-hd-h">High Density Horizontal</label>
                <select id="image-hd-h">
                  <option value="true">Yes</option>
                  <option value="false">No</option>
                </select>
              </div>
            </div>
          </details>
          <button class="btn" onclick="addItem('image')">Add Image</button>
        </div>

        <!-- Cut -->
        <div id="form-cut" class="hidden">
          <div class="field field-row-stacked">
            <label for="cut-enabled">Enabled</label>
            <select id="cut-enabled">
              <option value="true">Yes</option>
              <option value="false">No</option>
            </select>
          </div>
          <button class="btn" onclick="addItem('cut')">Add Cut</button>
        </div>
      </div>
    </section>

    <!-- JSON Preview -->
    <section>
      <h3>JSON Preview</h3>
      <pre id="preview"></pre>
    </section>

    <!-- Submit -->
    <section>
      <div class="row submit-row">
        <button class="btn btn-primary" onclick="submitJob()">Print</button>
        <button class="btn" onclick="clearItems()">Clear All</button>
        <span id="submit-status"></span>
      </div>
      <pre id="response-box"></pre>
    </section>

  </div><!-- #main-content -->

</body>

</html>
